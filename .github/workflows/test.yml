name: Allegro API — тест связи

on:
  workflow_dispatch:
    inputs:
      shop:
        description: 'Магазин'
        required: true
        default: IL
        type: choice
        options:
          - IL

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests PyNaCl

      - name: Test API connection
        run: python api_test.py
        env:
          SHOP:             ${{ github.event.inputs.shop }}
          GH_TOKEN:         ${{ secrets.GH_TOKEN }}
          GH_REPO:          ${{ github.repository }}
          CLIENT_ID_IL:     ${{ secrets.CLIENT_ID_IL }}
          CLIENT_SECRET_IL: ${{ secrets.CLIENT_SECRET_IL }}
          REFRESH_TOKEN_IL: ${{ secrets.REFRESH_TOKEN_IL }}
