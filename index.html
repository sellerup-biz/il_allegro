<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IL_Allegro — Allegro authorization</title>
  <style>
    :root { --orange:#ff5a00; --ink:#1a1a1a; --muted:#6b7280; --bg:#f6f7f9; --ok:#0a7d33; --err:#c2381b; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
           background:var(--bg); color:var(--ink); display:flex; min-height:100vh; align-items:center; justify-content:center; padding:24px; }
    .card { background:#fff; max-width:560px; width:100%; border-radius:16px; padding:32px;
            box-shadow:0 10px 40px rgba(0,0,0,.08); }
    .logo { display:inline-block; background:var(--orange); color:#fff; font-weight:700; letter-spacing:.5px;
            padding:6px 12px; border-radius:8px; font-size:14px; }
    h1 { font-size:22px; margin:18px 0 6px; }
    p { color:var(--muted); line-height:1.5; margin:8px 0; }
    .btn { display:inline-block; background:var(--orange); color:#fff; text-decoration:none; font-weight:600;
           padding:14px 22px; border-radius:10px; border:0; cursor:pointer; font-size:16px; margin-top:14px; }
    .btn:hover { filter:brightness(.95); }
    .code { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; background:#0f172a; color:#e2e8f0;
            padding:16px; border-radius:10px; word-break:break-all; font-size:14px; margin:12px 0; }
    .row { display:flex; gap:8px; align-items:center; margin-top:10px; }
    .copy { background:#111827; color:#fff; border:0; padding:10px 16px; border-radius:8px; cursor:pointer; }
    .banner { padding:12px 14px; border-radius:10px; font-weight:600; margin-bottom:8px; }
    .banner.ok { background:#e7f7ec; color:var(--ok); }
    .banner.err { background:#fdecea; color:var(--err); }
    .muted-box { background:#f3f4f6; border-radius:10px; padding:12px 14px; font-size:13px; color:#374151; }
    label.sandbox { display:flex; gap:8px; align-items:center; font-size:13px; color:var(--muted); margin-top:16px; }
    a.inline { color:var(--orange); }
  </style>
</head>
<body>
  <main class="card">
    <span class="logo">IL_Allegro</span>
    <div id="content"></div>
  </main>

  <script>
    // ---- Public config (no secrets here) ----
    var CLIENT_ID    = "b4c262586c54435ca6682884a96233ad";
    var REDIRECT_URI = "https://sellerup-biz.github.io/il_allegro/";
    var AUTH_PROD    = "https://allegro.pl/auth/oauth/authorize";
    var AUTH_SANDBOX = "https://allegro.pl.allegrosandbox.pl/auth/oauth/authorize";

    function $(html){ document.getElementById("content").innerHTML = html; }
    function randomState(){
      var a = new Uint8Array(16); crypto.getRandomValues(a);
      return Array.from(a).map(function(b){return b.toString(16).padStart(2,"0");}).join("");
    }
    function esc(s){ return String(s).replace(/[&<>"]/g, function(c){
      return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]; }); }

    var qs    = new URLSearchParams(location.search);
    var code  = qs.get("code");
    var error = qs.get("error");
    var state = qs.get("state");

    if (error) {
      $(
        '<div class="banner err">Authorization error</div>' +
        '<h1>Could not authorize</h1>' +
        '<p><b>' + esc(error) + '</b></p>' +
        '<p>' + esc(qs.get("error_description") || "") + '</p>' +
        '<a class="btn" href="' + REDIRECT_URI + '">Try again</a>'
      );
    } else if (code) {
      $(
        '<div class="banner ok">Authorization successful</div>' +
        '<h1>Copy your authorization code</h1>' +
        '<p>Paste this code back to your assistant to finish connecting. ' +
           'It is single-use and expires within a few minutes.</p>' +
        '<div class="code" id="codeBox">' + esc(code) + '</div>' +
        '<div class="row"><button class="copy" id="copyBtn">Copy code</button>' +
        '<span id="copied" style="color:var(--ok);font-size:13px;"></span></div>' +
        (state ? '<p style="font-size:12px">state: ' + esc(state) + '</p>' : '') +
        '<p class="muted-box" style="margin-top:16px">Next step (run locally): ' +
           '<br><code>node src/exchange-code.js ' + esc(code) + '</code></p>'
      );
      document.getElementById("copyBtn").onclick = function(){
        navigator.clipboard.writeText(code).then(function(){
          document.getElementById("copied").textContent = "copied ✓";
        });
      };
    } else {
      $(
        '<h1>Connect to Allegro</h1>' +
        '<p>Click below to log in to Allegro and authorize the <b>IL_read</b> application. ' +
           'After approval you will be redirected back here with a code.</p>' +
        '<a class="btn" id="loginBtn" href="#">Log in with Allegro</a>' +
        '<label class="sandbox"><input type="checkbox" id="sandbox"> use sandbox environment</label>' +
        '<p class="muted-box" style="margin-top:16px">Redirect URI:<br><b>' + REDIRECT_URI + '</b><br>' +
           'Register this exact URL in your Allegro app settings.</p>'
      );
      function buildUrl(){
        var base = document.getElementById("sandbox").checked ? AUTH_SANDBOX : AUTH_PROD;
        var p = new URLSearchParams({
          response_type: "code",
          client_id: CLIENT_ID,
          redirect_uri: REDIRECT_URI,
          state: randomState()
        });
        return base + "?" + p.toString();
      }
      var btn = document.getElementById("loginBtn");
      btn.href = buildUrl();
      document.getElementById("sandbox").onchange = function(){ btn.href = buildUrl(); };
      btn.onclick = function(){ btn.href = buildUrl(); };
    }
  </script>
</body>
</html>
